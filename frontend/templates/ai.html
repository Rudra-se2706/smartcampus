<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Assistant – SmartCampus</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- Navbar -->
  <nav class="bg-indigo-600 text-white px-6 py-4 flex justify-between items-center">
    <h1 class="text-xl font-bold">SmartCampus</h1>
    <div class="flex gap-6 text-sm font-medium">
      <a href="/dashboard" class="hover:underline">Dashboard</a>
      <a href="/notices" class="hover:underline">Notices</a>
      <a href="/groups" class="hover:underline">Study Groups</a>
      <a href="/ai" class="hover:underline">AI Assistant</a>
      <a href="/security" class="hover:underline">Security</a>
      <a href="/logout" class="hover:underline text-red-200">Logout</a>
    </div>
  </nav>

  <div class="max-w-3xl mx-auto px-6 py-10">
    <h2 class="text-2xl font-bold text-gray-800 mb-2">🤖 AI Doubt Solver</h2>
    <p class="text-gray-500 mb-6">Ask any academic question and get an instant answer!</p>

    <!-- Question Form -->
    <div class="bg-white rounded-2xl shadow p-6 mb-6">
      <form id="aiForm" class="space-y-3">
        <textarea id="question" required placeholder="Type your question here... e.g. What is recursion in Python?" rows="3"
          class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400"></textarea>
        <button type="submit"
          class="bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700 font-semibold">
          Ask AI ✨
        </button>
      </form>
    </div>

    <!-- Answer Box -->
    <div id="answerBox" class="hidden bg-white rounded-2xl shadow p-6">
      <h3 class="text-lg font-semibold text-gray-700 mb-3">Answer:</h3>
      <div id="loadingSpinner" class="hidden text-indigo-500 text-sm mb-2">⏳ Thinking...</div>
      <p id="answerText" class="text-gray-700 whitespace-pre-wrap leading-relaxed"></p>
    </div>
  </div>

  <script>
    document.getElementById('aiForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const question = document.getElementById('question').value.trim();
      if (!question) return;

      // Show answer box and loading
      document.getElementById('answerBox').classList.remove('hidden');
      document.getElementById('loadingSpinner').classList.remove('hidden');
      document.getElementById('answerText').textContent = '';

      try {
        const res = await fetch('/api/ask', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question: question })
        });
        const data = await res.json();
        document.getElementById('loadingSpinner').classList.add('hidden');
        document.getElementById('answerText').innerHTML = data.answer
  .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
  .replace(/\*(.*?)\*/g, '<em>$1</em>')
  .replace(/```[\w]*\n?([\s\S]*?)```/g, '<pre class="bg-gray-100 rounded p-3 text-sm font-mono mt-2 overflow-x-auto">$1</pre>')
  .replace(/\n/g, '<br>');
      } catch (err) {
        document.getElementById('loadingSpinner').classList.add('hidden');
        document.getElementById('answerText').textContent = 'Error connecting to AI. Please try again.';
      }
    });
  </script>

</body>
</html>
