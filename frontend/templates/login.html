<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login – SmartCampus</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
  <div class="bg-white p-8 rounded-2xl shadow-md w-full max-w-md">
    <h2 class="text-3xl font-bold text-indigo-600 mb-2 text-center">Welcome Back</h2>
    <p class="text-gray-400 text-center mb-6">Login to SmartCampus</p>

    {% if error %}
    <div class="bg-red-100 text-red-600 px-4 py-2 rounded mb-4 text-sm">{{ error }}</div>
    {% endif %}

    <form action="/api/login" method="POST" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input type="email" name="email" required
          class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400"
          placeholder="you@college.edu">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input type="password" name="password" required
          class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400"
          placeholder="••••••••">
      </div>
      <button type="submit"
        class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700 font-semibold">
        Login
      </button>
    </form>
    <p class="text-center text-sm text-gray-500 mt-4">
      Don't have an account? <a href="/register" class="text-indigo-600 hover:underline">Register</a>
    </p>
  </div>
</body>
</html>
